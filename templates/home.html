<!DOCTYPE html>
<html >

<head>
  <meta charset="UTF-8">
  <title>ML API</title>
  <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Arimo' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Hind:300' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300' rel='stylesheet' type='text/css'>

  
</head>

<body>
 <div class="login">
	<h1>Boston House Price Prediction</h1>

     <!-- Main Input For Receiving Query to our ML -->
    <form action="{{ url_for('predict')}}"method="post">
      <input type="text" name="neighborhood" placeholder="neighborhood" required="required" /><br>
    	<input type="text" name="reviews" placeholder="reviews" required="required" /><br>
        <input type="text" name="overall_satisfaction" placeholder="overall_satisfaction" required="required" /><br>
        <input type="text" name="accomodates" placeholder="accomodates" required="required" /><br>
        <input type="text" name="bedrooms" placeholder="bedrooms" required="required" /><br>
        <input type="text" name="latitude" placeholder="latitude" required="required" /><br>
        <input type="text" name="longitude" placeholder="longitude" required="required" /><br>
        <input type="text" name="day" placeholder="day" required="required" /><br>
        <input type="text" name="hour" placeholder="hour" required="required" /><br>
        <input type="text" name="minute" placeholder="minute" required="required" /><br>
        <input type="text" name="distance to neghborhood" placeholder="distance to neghborhood" required="required" /><br>
        <input type="text" name="private room" placeholder="private room" required="required" /><br>
        <input type="text" name="shared room" placeholder="shared room" required="required" /><br>

       

        <button type="submit" class="btn btn-primary btn-block btn-large">Predict</button>
    </form>

   <br>
   <br>
  
   
 </div>
 {{prediction_text}}

</body>
</html>
